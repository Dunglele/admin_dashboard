{% extends "base.html" %}

{% block title %}Đăng nhập - Admin Panel{% endblock %}

{% block login_content %}
<div class="login-container">
    <h2 style="text-align: center; margin-bottom: 30px;">ADMIN LOGIN</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div style="color: red; margin-bottom: 15px; text-align: center;">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required placeholder="admin@shop.com">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">ĐĂNG NHẬP</button>
    </form>
</div>
{% endblock %}
